<!DOCTYPE html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>카드뉴스 — 하나님을향한반응으로서의예배</title><style>
:root{--ink:#1f2a30;--muted:#5b727c;--bg:#f4f7f8;--card:#fff;--accent:#2c5364;--gold:#b8893a}
*{box-sizing:border-box}

.btn span{color:var(--muted);font-size:14px}
